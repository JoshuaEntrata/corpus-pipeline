version: v1

raw_collection:
  required:
    - source_platform
    - source_item_id
    - collection_method
  fields:
    source_platform: string
    source_item_id: string
    source_url: string_or_null
    collection_method: string
    created_at_utc: datetime_or_null
    title: string_or_null
    body_text: string_or_null
    description: string_or_null
    transcript: string_or_null
    comments_json: json_or_null

normalized_text_rows:
  required:
    - source_platform
    - id
    - preprocessed_text
    - collection_method
  fields:
    source_platform: string
    id: string
    preprocessed_text: string
    collection_method: string
    has_ai_keyword: boolean
    has_health_keyword: boolean
    needs_classification: boolean
    needs_language_detection: boolean

classification:
  fields:
    text: string
    ai_healthcare_label: string
    ai_healthcare_confidence: float_or_string
    classification_reason_short: string
    classified_at_utc: datetime
    used_prefilter: boolean
    prefilter_result: string_or_null

language_detection:
  fields:
    id: string
    text: string
    ai_healthcare_label: string
    language_label: string
    language_confidence: float_or_string
    language_detector_version: string
    detector_votes_json: json
    used_openai_fallback: boolean
    language_detected_at_utc: datetime
