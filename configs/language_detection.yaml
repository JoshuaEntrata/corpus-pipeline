input_folder: data/classified
output_folder: data/language_detected

target_languages:
  - english
  - tagalog
  - cebuano
  - ilocano
  - hiligaynon
  - mixed_english_tagalog
  - mixed_english_cebuano
  - mixed_english_ilocano
  - mixed_english_hiligaynon
  - mixed_tagalog_cebuano
  - mixed_tagalog_ilocano
  - mixed_tagalog_hiligaynon
  - mixed_cebuano_ilocano
  - mixed_cebuano_hiligaynon
  - mixed_ilocano_hiligaynon
  - mixed_multiple
  - mixed_other
  - unknown
  - too_short

thresholds:
  min_chars_for_detection: 15
  strong_confidence: 0.80
  fallback_confidence: 0.60
  min_rule_score: 1.0
  mixed_score_ratio: 0.35

fallback:
  use_openai_when_uncertain: true
  use_openai_for_short_text: false
  model: gpt-4o-mini

